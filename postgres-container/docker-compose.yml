version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_socity
    restart: always
    environment:
      POSTGRES_USER: socity
      POSTGRES_PASSWORD: socity
      POSTGRES_DB: socity_db
    ports:
      - "5432:5432"
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data

      # Mount SQL files for auto-execution
      - ./schema.sql:/docker-entrypoint-initdb.d/1-schema.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
